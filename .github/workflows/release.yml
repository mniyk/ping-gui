name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: ping-gui-windows-x86_64.zip
          - os: ubuntu-latest
            asset_name: ping-gui-linux-x86_64.tar.gz
          - os: macos-latest
            asset_name: ping-gui-macos-aarch64.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Install Dioxus CLI
        run: cargo install --locked dioxus-cli

      - name: Build
        run: dx bundle --release --platform desktop

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target -Filter "ping-gui.exe" -Recurse | Where-Object { $_.FullName -match "dx" -and $_.FullName -match "release" } | Select-Object -First 1
          if (-not $exe) { throw "binary not found" }
          Compress-Archive -Path "$($exe.DirectoryName)\*" -DestinationPath "${{ matrix.asset_name }}"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          DMG=$(find target -name "*.dmg" | head -n1)
          if [ -z "$DMG" ]; then echo "dmg not found"; exit 1; fi
          cp "$DMG" "${{ matrix.asset_name }}"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          BIN=$(find target -type f -name "ping-gui" -path "*/dx/*" -path "*release*" | head -n1)
          if [ -z "$BIN" ]; then echo "binary not found"; exit 1; fi
          tar -czf "${{ matrix.asset_name }}" -C "$(dirname "$BIN")" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
